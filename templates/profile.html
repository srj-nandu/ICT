<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{page_title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="site-shell header-bar">
            <a class="brand" href="/templates/dashboard.html">
                <span class="brand-mark">CV</span>
                <span>
                    <strong>Careermitra</strong>
                    <small>User profile</small>
                </span>
            </a>
            <nav class="nav">{{nav_links}}</nav>
            <div class="header-auth">{{auth_block}}</div>
        </div>
    </header>

    <main class="site-shell page-stack">
        <section class="panel">
            {{message_block}}
            <div class="section-headline">
                <h2>Profile</h2>
                <p>Role: <strong>{{role_label}}</strong></p>
            </div>
            <form class="stack-form" action="/templates/profile.html" method="post">
                <label class="field-label" for="full_name">Full name</label>
                <input id="full_name" name="full_name" class="form-control" type="text" value="{{full_name_value}}" required>

                <label class="field-label" for="email">Email</label>
                <input id="email" class="form-control" type="email" value="{{email_value}}" disabled>

                <label class="field-label" for="phone">Phone</label>
                <input id="phone" name="phone" class="form-control" type="text" value="{{phone_value}}">

                <label class="field-label" for="headline">Headline</label>
                <input id="headline" name="headline" class="form-control" type="text" value="{{headline_value}}">

                <label class="field-label" for="location">Location</label>
                <input id="location" name="location" class="form-control" type="text" value="{{location_value}}">

                <button class="primary-button" type="submit">Save Profile</button>
            </form>
        </section>

        <section class="panel">
            <div class="section-headline">
                <h2>Uploaded Resumes</h2>
                <p>Your stored PDF files and analysis results.</p>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Resume</th>
                            <th>Job Role</th>
                            <th>Match</th>
                            <th>Uploaded</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody>{{resume_rows}}</tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
